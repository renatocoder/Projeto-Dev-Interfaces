<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiu‑Jitsu Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        /* --------------------------------------------------------------
                   CSS – BASE E VARIÁVEIS (tema claro/escuro)
                   -------------------------------------------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --radius: 20px;
            --transition: 0.4s cubic-bezier(.25, .46, .45, .94);
            --shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            --shadow-hover: 0 25px 60px rgba(0, 0, 0, 0.25);
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --bg-card: #ffffff;
            --bg-header: #0f1a2e;
            --bg-footer: #0f1a2e;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-header: #ffffff;
            --accent: #e67e22;
            --accent-hover: #d35400;
            --border: #e0e4e8;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --input-bg: #ffffff;
            --input-border: #ccd0d5;
            --modal-overlay: rgba(0, 0, 0, 0.6);
            --gradient-start: #f0f2f5;
            --gradient-end: #dce1e8;
        }

        [data-theme="dark"] {
            --bg: #12121a;
            --bg-card: #1e1e2e;
            --bg-header: #0a0a14;
            --bg-footer: #0a0a14;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-header: #ffffff;
            --accent: #f39c12;
            --accent-hover: #e67e22;
            --border: #2a2a3a;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --input-bg: #2a2a3a;
            --input-border: #3a3a4a;
            --modal-overlay: rgba(0, 0, 0, 0.8);
            --gradient-start: #12121a;
            --gradient-end: #1a1a2e;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background var(--transition), color var(--transition);
            overflow-x: hidden;
            position: relative;
        }

        /* Fundo com partículas animadas (canvas) */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Todos os conteúdos ficam acima do canvas */
        .app-header,
        .app-main,
        .app-footer,
        .video-modal {
            position: relative;
            z-index: 1;
        }

        /* --------------------------------------------------------------
                   HEADER / NAV
                   -------------------------------------------------------------- */
        .app-header {
            background: var(--bg-header);
            color: var(--text-header);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            backdrop-filter: blur(10px);
            background: rgba(15, 26, 46, 0.92);
            transition: background var(--transition);
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--accent), #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 1.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-header);
            font-weight: 600;
            transition: all var(--transition);
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
            font-size: 0.95rem;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width var(--transition);
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        .nav-links .btn-logout {
            background: var(--accent);
            border: none;
            padding: 0.4rem 1.4rem;
            border-radius: 50px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.9rem;
        }
        .nav-links .btn-logout:hover {
            background: var(--accent-hover);
            transform: scale(1.06) rotate(-2deg);
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            color: #fff;
            font-size: 1.4rem;
            padding: 0.3rem 0.7rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all var(--transition);
            line-height: 1;
            backdrop-filter: blur(4px);
        }
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(20deg);
        }

        .menu-hamburger {
            display: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-header);
            transition: transform var(--transition);
        }
        .menu-hamburger:hover {
            transform: rotate(90deg);
        }

        /* --------------------------------------------------------------
                   MAIN E PÁGINAS
                   -------------------------------------------------------------- */
        .app-main {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            animation: fadeSlide 0.6s ease;
            z-index: 1;
            position: relative;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* --------------------------------------------------------------
                   AUTH (Login / Cadastro)
                   -------------------------------------------------------------- */
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        .auth-card {
            background: var(--bg-card);
            padding: 2.8rem 2.2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            transition: all var(--transition);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, var(--accent), transparent 70%);
            opacity: 0.05;
            animation: rotateBg 20s linear infinite;
        }

        @keyframes rotateBg {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .auth-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: var(--shadow-hover);
        }

        .auth-card h2 {
            color: var(--text-primary);
            margin-bottom: 0.8rem;
            text-align: center;
            font-size: 2rem;
            border-left: none;
            padding-left: 0;
        }

        .auth-card .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .auth-card label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .auth-card input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--input-border);
            border-radius: 12px;
            font-size: 1rem;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: all var(--transition);
            margin-bottom: 1.2rem;
        }
        .auth-card input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 5px rgba(230, 126, 34, 0.2);
            transform: scale(1.01);
        }

        .auth-card .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: #fff;
            border: none;
            padding: 0.85rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            margin-top: 0.5rem;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
        }
        .auth-card .btn-primary:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.4);
        }

        .auth-card .auth-switch {
            text-align: center;
            margin-top: 1.4rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        .auth-card .auth-switch a {
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
        }
        .auth-card .auth-switch a:hover {
            text-decoration: underline;
        }

        .msg-error,
        .msg-success {
            padding: 0.7rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.2rem;
            display: none;
            font-size: 0.9rem;
            font-weight: 600;
            animation: fadeSlide 0.3s ease;
        }
        .msg-error {
            background: #fde8e8;
            color: #a12525;
            border-left: 4px solid #a12525;
        }
        .msg-success {
            background: #e6f7e6;
            color: #1a7a1a;
            border-left: 4px solid #1a7a1a;
        }

        /* --------------------------------------------------------------
                   HOME
                   -------------------------------------------------------------- */
        .hero-banner {
            background: linear-gradient(135deg, var(--bg-header), #1a2a4a);
            color: #fff;
            padding: 3.5rem 2.5rem;
            border-radius: var(--radius);
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hero-banner::after {
            content: '🥋';
            position: absolute;
            right: -20px;
            bottom: -20px;
            font-size: 12rem;
            opacity: 0.05;
            transform: rotate(10deg);
        }

        .hero-banner h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .hero-banner h1 span {
            background: linear-gradient(135deg, var(--accent), #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-banner p {
            font-size: 1.2rem;
            opacity: 0.85;
        }

        .xp-bar-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 0.2rem;
            margin: 1.5rem auto 0;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .xp-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), #f1c40f);
            border-radius: 50px;
            transition: width 0.8s ease;
        }

        .xp-text {
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            padding-right: 0.5rem;
        }

        .page-title {
            color: var(--text-primary);
            margin-bottom: 1.8rem;
            border-left: 6px solid var(--accent);
            padding-left: 1.2rem;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .intro-text {
            font-size: 1.1rem;
            line-height: 1.8;
            max-width: 800px;
            background: var(--bg-card);
            padding: 2rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-top: 1rem;
            transition: all var(--transition);
        }

        .intro-text:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .quote-block {
            background: var(--bg-header);
            color: #fff;
            padding: 1.8rem;
            border-radius: var(--radius);
            margin-top: 1.8rem;
            text-align: center;
            font-style: italic;
            font-size: 1.2rem;
            border-left: 6px solid var(--accent);
        }

        /* --------------------------------------------------------------
                   FAIXAS – CARDS COM EFEITO 3D E VÍDEOS
                   -------------------------------------------------------------- */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2.2rem;
            margin-top: 1.8rem;
        }

        .card-item {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.8rem 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all var(--transition);
            transform-style: preserve-3d;
            perspective: 800px;
            position: relative;
            cursor: default;
        }

        .card-item:hover {
            transform: translateY(-12px) rotateX(2deg) rotateY(2deg);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }

        .card-item .faixa-img {
            width: 100%;
            max-height: 140px;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 1rem;
            border: 2px solid var(--border);
            transition: transform var(--transition);
        }

        .card-item:hover .faixa-img {
            transform: scale(1.02);
        }

        .card-item h3 {
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 0.3rem;
            font-size: 1.3rem;
        }

        .card-item .tempo {
            display: block;
            text-align: center;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.85rem;
            margin: 0.3rem 0 0.8rem;
        }

        .card-item ul {
            list-style: none;
            padding: 0;
        }

        .card-item ul li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
        }

        .card-item ul li:last-child {
            border-bottom: none;
        }

        .card-item ul li::before {
            content: "▸";
            color: var(--accent);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .card-item ul li .play-icon {
            margin-left: auto;
            color: var(--accent);
            font-size: 1.2rem;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(230, 126, 34, 0.1);
        }

        .card-item ul li:hover .play-icon {
            transform: scale(1.4);
            background: rgba(230, 126, 34, 0.2);
        }

        .card-item ul li:hover {
            color: var(--accent);
            padding-left: 0.5rem;
        }

        /* --------------------------------------------------------------
                   CARROSSEL
                   -------------------------------------------------------------- */
        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 950px;
            margin: 2.5rem auto;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            background: var(--bg-header);
        }

        .carousel-slides {
            display: flex;
            transition: transform 0.7s cubic-bezier(.25, .46, .45, .94);
        }

        .carousel-slide {
            min-width: 100%;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f1a2e;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            padding: 1rem 0.8rem;
            cursor: pointer;
            font-size: 1.8rem;
            transition: all var(--transition);
            z-index: 10;
            line-height: 1;
            backdrop-filter: blur(6px);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-btn:hover {
            background: var(--accent);
            transform: translateY(-50%) scale(1.1);
        }

        .carousel-btn.prev {
            left: 1rem;
        }
        .carousel-btn.next {
            right: 1rem;
        }

        .carousel-indicators {
            position: absolute;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.7rem;
            z-index: 10;
        }

        .carousel-indicators .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all var(--transition);
        }

        .carousel-indicators .dot.active {
            background: var(--accent);
            border-color: #fff;
            transform: scale(1.25);
        }

        .carousel-indicators .dot:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        /* --------------------------------------------------------------
                   MODAL DE VÍDEO (com modo foco)
                   -------------------------------------------------------------- */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
            padding: 1.5rem;
        }

        .video-modal.open {
            display: flex;
        }

        .video-modal-content {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.8rem;
            max-width: 900px;
            width: 100%;
            position: relative;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            transition: all var(--transition);
            animation: modalIn 0.4s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .video-modal-content .close-modal {
            position: absolute;
            top: -14px;
            right: -14px;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 1.6rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .video-modal-content .close-modal:hover {
            transform: rotate(90deg) scale(1.1);
            background: var(--accent-hover);
        }

        .video-modal-content .video-title {
            color: var(--text-primary);
            font-weight: 700;
            margin-bottom: 0.8rem;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .video-modal-content .video-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .video-modal-content .video-actions button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.85rem;
        }

        .video-modal-content .video-actions button:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .video-modal-content iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            border-radius: 12px;
            background: #000;
        }

        /* modo foco (expandido) */
        .video-modal.focus-mode .video-modal-content {
            max-width: 100vw;
            max-height: 100vh;
            padding: 0;
            background: transparent;
            box-shadow: none;
            border-radius: 0;
        }

        .video-modal.focus-mode .video-modal-content .close-modal {
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
        }

        .video-modal.focus-mode .video-modal-content .video-title,
        .video-modal.focus-mode .video-modal-content .video-actions {
            display: none;
        }

        .video-modal.focus-mode .video-modal-content iframe {
            border-radius: 0;
            aspect-ratio: 16/9;
            max-height: 100vh;
            width: 100vw;
            height: 100vh;
        }

        /* --------------------------------------------------------------
                   PROMOÇÃO
                   -------------------------------------------------------------- */
        .promo-box {
            background: var(--bg-header);
            color: #fff;
            padding: 2.5rem;
            border-radius: var(--radius);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-top: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .promo-box h3 {
            color: var(--accent);
            margin-bottom: 0.8rem;
            font-size: 1.4rem;
        }

        .promo-box ul {
            list-style: none;
            padding: 0;
        }

        .promo-box ul li {
            padding: 0.4rem 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .promo-box ul li:last-child {
            border-bottom: none;
        }

        .promo-box ul li::before {
            content: "⏳";
            margin-right: 0.5rem;
            font-size: 1.1rem;
        }

        .promo-box .dica {
            background: rgba(255, 255, 255, 0.06);
            padding: 1.2rem;
            border-radius: 12px;
            margin-top: 1.2rem;

        // ================================================================
        // 3. PARTÍCULAS (canvas)
        // ================================================================
        (function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            const particles = [];
            const count = 80;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.r = Math.random() * 3 + 1;
                    this.dx = (Math.random() - 0.5) * 0.8;
                    this.dy = (Math.random() - 0.5) * 0.8;
                    this.opacity = Math.random() * 0.4 + 0.1;
                }
                update() {
                    this.x += this.dx;
                    this.y += this.dy;
                    if (this.x < 0 || this.x > w) this.dx *= -1;
                    if (this.y < 0 || this.y > h) this.dy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(230, 126, 34, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update();
                    p.draw(); });
                // linhas entre partículas próximas
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(230, 126, 34, ${0.08 * (1 - dist/150)})`;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        })();

                localStorage.setItem('jj_users', JSON.stringify(users));
                // Atualiza currentUser
                currentUser = { ...users[idx] };
                localStorage.setItem('jj_user', JSON.stringify(currentUser));
                updateXPBar();
            }
        }

                    </div>
                    <div style="margin-top:2rem; background:var(--bg-card); padding:1.8rem; border-radius:var(--radius); border:1px solid var(--border);">
                        <h3 style="color:var(--accent);">🎯 Seu progresso atual</h3>
                        <p style="margin-top:0.5rem;">XP: <strong>${getXP()}</strong> · Faixa: <strong>${getFaixaByXP(getXP())}</strong></p>
                        <p style="font-size:0.9rem; color:var(--text-secondary);">
                            ${getXP() < 100 ? 'Faltam ' + (100 - getXP()) + ' XP para a faixa Azul.' :
                              getXP() < 300 ? 'Faltam ' + (300 - getXP()) + ' XP para a faixa Roxa.' :
                              getXP() < 600 ? 'Faltam ' + (600 - getXP()) + ' XP para a faixa Marrom.' :
                              getXP() < 1000 ? 'Faltam ' + (1000 - getXP()) + ' XP para a faixa Preta.' :
                              '🔥 Você já é faixa Preta! Continue evoluindo.'}
                        </p>
                    </div>
                `;
        }

        function pageBeneficios() {
            const beneficios = [
                { emoji: '💪', titulo: 'Condicionamento', desc: 'Força, resistência e flexibilidade' },
                { emoji: '🧠', titulo: 'Disciplina Mental', desc: 'Foco, paciência e controle emocional' },
                { emoji: '🛡️', titulo: 'Defesa Pessoal', desc: 'Técnicas reais para situações de risco' },
                { emoji: '🤝', titulo: 'Comunidade', desc: 'Amizades, respeito e hierarquia' },
                { emoji: '😌', titulo: 'Redução de Estresse', desc: 'Alivia ansiedade e melhora o sono' },
                { emoji: '🧩', titulo: 'Resolução de Problemas', desc: 'Pensamento rápido e estratégico' },
                { emoji: '⚡', titulo: 'Flow State', desc: 'Conexão mente-corpo em movimento' },
            ];
            let itemsHTML = beneficios.map(b =>
                `<div class="benefit-item"><span class="emoji">${b.emoji}</span><h3>${b.titulo}</h3><p>${b.desc}</p></div>`
            ).join('');
            return `
                    <h2 class="page-title">✅ Benefícios do Jiu‑Jitsu Flow</h2>
                    <div class="benefits-grid">${itemsHTML}</div>
                    <div class="btn-center">
                        <a href="https://www.atletis.com.br/jiu-jitsu" target="_blank" class="btn-link">
                            Quero saber mais →
                        </a>
                    </div>
                `;
        }

        // ================================================================
        // 6. ROTEADOR
        // ================================================================
        function navigate(page) {
            currentPage = page;
            if (!currentUser && page !== 'login' && page !== 'cadastro') {
                page = 'login';
                currentPage = 'login';
            }

            let html = '';
            switch (page) {
                case 'login':
                    html = pageLogin();
                    break;
                case 'cadastro':
                    html = pageCadastro();
                    break;
                case 'home':
                    html = pageHome();
                    break;
                case 'faixas':
                    html = pageFaixas();
                    break;
                case 'promocao':
                    html = pagePromocao();
                    break;
                case 'beneficios':
                    html = pageBeneficios();
                    break;
                default:
                    html = pageHome();
            }
            render(html);
            updateNav();
            attachEvents(page);

            if (page === 'faixas') {
                initCarousel();
                attachVideoEvents();
            }
            if (page === 'home' || page === 'promocao') {
                updateXPBar();
            }
        }

        // ================================================================
        // 7. CARROSSEL
        // ================================================================
        let currentSlide = 0;
        let totalSlides = 0;
        let autoPlayInterval = null;

        function initCarousel() {
            const slides = document.querySelectorAll('.carousel-slide');
            const indicators = document.querySelectorAll('.dot');
            const prevBtn = document.getElementById('carouselPrev');
            const nextBtn = document.getElementById('carouselNext');
            if (!slides.length) return;

            totalSlides = slides.length;
            currentSlide = 0;

            function goTo(index) {
                if (index < 0) index = totalSlides - 1;
                if (index >= totalSlides) index = 0;
                currentSlide = index;
                const container = document.getElementById('carouselSlides');
                if (container) container.style.transform = `translateX(-${currentSlide*100}%)`;
                indicators.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
            }

            prevBtn?.addEventListener('click', () => { goTo(currentSlide - 1);
                resetAuto(); });
            nextBtn?.addEventListener('click', () => { goTo(currentSlide + 1);
                resetAuto(); });
            indicators.forEach((d, i) => d.addEventListener('click', () => { goTo(i);
                resetAuto(); }));

            document.addEventListener('keydown', (e) => {
                if (currentPage !== 'faixas') return;
                if (e.key === 'ArrowLeft') { goTo(currentSlide - 1);
                    resetAuto(); }
                if (e.key === 'ArrowRight') { goTo(currentSlide + 1);
                    resetAuto(); }
            });

            function startAuto() {
                if (autoPlayInterval) clearInterval(autoPlayInterval);
                autoPlayInterval = setInterval(() => goTo(currentSlide + 1), 4000);
            }

            function resetAuto() { startAuto(); }

            const container = document.getElementById('carousel');
            container?.addEventListener('mouseenter', () => { if (autoPlayInterval) clearInterval(autoPlayInterval); });
            container?.addEventListener('mouseleave', startAuto);

            startAuto();
            goTo(0);
        }

        // ================================================================
        // 8. VÍDEOS E MODAL
        // ================================================================
        function openVideo(url, title) {
            currentVideoUrl = url;
            currentVideoTitle = title;
            videoIframe.src = url;
            videoTitle.textContent = title;
            videoModal.classList.remove('focus-mode');
            videoModal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            videoModal.classList.remove('open', 'focus-mode');
            videoIframe.src = '';
            document.body.style.overflow = '';
        }

        function toggleFocusMode() {
            videoModal.classList.toggle('focus-mode');
        }

        function gainXPFromVideo() {
            addXP(10);
            // Feedback visual
            const btn = xpGainBtn;
            btn.textContent = '✅ +10 XP ganho!';
            btn.style.background = '#27ae60';
            setTimeout(() => {
                btn.textContent = '+10 XP ao assistir';
                btn.style.background = '';
            }, 2000);
            updateXPBar();
            // Atualiza o título da faixa no modal
            const faixaAtual = getFaixaByXP(getXP());
            document.querySelector('.video-title').textContent =
                `${currentVideoTitle} (${faixaAtual})`;
        }

        function attachVideoEvents() {
            document.querySelectorAll('.card-item ul li[data-video]').forEach(item => {
                item.addEventListener('click', () => {
                    const url = item.dataset.video;
                    const title = item.dataset.title;
                    openVideo(url, title);
                });
            });
        }

        // Eventos do modal
        closeModal.addEventListener('click', closeVideo);
        videoModal.addEventListener('click', (e) => {
            if (e.target === videoModal) closeVideo();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeVideo();
        });
        focusModeBtn.addEventListener('click', toggleFocusMode);
        xpGainBtn.addEventListener('click', gainXPFromVideo);

        // ================================================================
        // 9. MENU
        // ================================================================
        function updateNav() {
            if (currentUser) {
                navLinks.innerHTML = `
                        <li><a href="#" data-page="home" class="${currentPage==='home'?'active':''}">Home</a></li>
                        <li><a href="#" data-page="faixas" class="${currentPage==='faixas'?'active':''}">Faixas</a></li>
                        <li><a href="#" data-page="promocao" class="${currentPage==='promocao'?'active':''}">Promoção</a></li>
                        <li><a href="#" data-page="beneficios" class="${currentPage==='beneficios'?'active':''}">Benefícios</a></li>
                        <li><button class="btn-logout" id="logoutBtn">Sair</button></li>
                    `;
                navLinks.querySelectorAll('[data-page]').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        navigate(link.dataset.page);
                        document.getElementById('navLinks').classList.remove('open');
                    });
                });
                document.getElementById('logoutBtn').addEventListener('click', logout);
            } else {
                navLinks.innerHTML = `
                        <li><a href="#" data-page="login" class="${currentPage==='login'?'active':''}">Login</a></li>
                        <li><a href="#" data-page="cadastro" class="${currentPage==='cadastro'?'active':''}">Cadastro</a></li>
                    `;
                navLinks.querySelectorAll('[data-page]').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        navigate(link.dataset.page);
                        document.getElementById('navLinks').classList.remove('open');
                    });
                });
            }
        }

        // ================================================================
        // 10. AUTENTICAÇÃO
        // ================================================================
        function login(email, senha) {
            const users = JSON.parse(localStorage.getItem('jj_users')) || [];
            const user = users.find(u => u.email === email && u.senha === senha);
            if (!user) { showMessage('error', 'E-mail ou senha inválidos.'); return false; }
            currentUser = { ...user };
            localStorage.setItem('jj_user', JSON.stringify(currentUser));
            navigate('home');
            return true;
        }

        function cadastro(nome, email, senha, confirma) {
            if (senha !== confirma) { showMessage('error', 'Senhas não coincidem.'); return false; }
            if (senha.length < 6) { showMessage('error', 'Senha deve ter 6+ caracteres.'); return false; }
            const users = JSON.parse(localStorage.getItem('jj_users')) || [];
            if (users.find(u => u.email === email)) { showMessage('error', 'E-mail já cadastrado.'); return false; }
            users.push({ nome, email, senha, xp: 0, faixa: 'Branca' });
            localStorage.setItem('jj_users', JSON.stringify(users));
            showMessage('success', 'Conta criada! Faça login.');
            navigate('login');
            return true;
        }

        function logout() {
            localStorage.removeItem('jj_user');
            currentUser = null;
            navigate('login');
        }

        // ================================================================
        // 11. EVENTOS ESPECÍFICOS
        // ================================================================
        function attachEvents(page) {
            if (page === 'login') {
                document.getElementById('loginForm')?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    login(
                        document.getElementById('loginEmail').value.trim(),
                        document.getElementById('loginSenha').value.trim()
                    );
                });
                document.getElementById('goToCadastro')?.addEventListener('click', () => navigate('cadastro'));
            }
            if (page === 'cadastro') {
                document.getElementById('cadastroForm')?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    cadastro(
                        document.getElementById('cadNome').value.trim(),
                        document.getElementById('cadEmail').value.trim(),
                        document.getElementById('cadSenha').value.trim(),
                        document.getElementById('cadConfirma').value.trim()
                    );
                });
                document.getElementById('goToLogin')?.addEventListener('click', () => navigate('login'));
            }
            menuToggle.onclick = () => document.getElementById('navLinks').classList.toggle('open');
        }

        // ================================================================
        // 12. TEMA
        // ================================================================
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('jj_theme', next);
        }

        (function loadTheme() {
            const saved = localStorage.getItem('jj_theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            themeToggle.textContent = saved === 'dark' ? '☀️' : '🌙';
        })();

        themeToggle.addEventListener('click', toggleTheme);

        // ================================================================
        // 13. INICIALIZAÇÃO
        // ================================================================
        function init() {
            if (currentUser) navigate('home');
            else navigate('login');
        }
        init();
    </script>
</body>
</html>
