<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiu-Jitsu Pro - International</title>
    <meta name="description" content="Guia completo sobre Jiu-Jitsu Brasileiro com vídeos, faixas, benefícios e muito mais.">
    <meta name="theme-color" content="#1A2F4C">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

    <!-- CSS Principal -->
    <link rel="stylesheet" href="style.css">

    <!-- Favicon (emoji como fallback) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥋</text></svg>">
</head>
<body>

    <!-- ============================================================
    HEADER / NAVEGAÇÃO (sempre visível)
    ============================================================ -->
    <header class="app-header" role="banner">
        <div class="logo" aria-label="Jiu-Jitsu Pro">
            🥋 Jiu<span>Jitsu</span>
        </div>

        <!-- Menu de navegação (preenchido pelo JavaScript) -->
        <ul class="nav-links" id="navLinks" role="navigation" aria-label="Menu principal">
            <!-- Os links são gerados dinamicamente pelo script.js -->
        </ul>

        <!-- Ações do header -->
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema claro/escuro">
                🌙
            </button>
            <button class="menu-hamburger" id="menuToggle" aria-label="Abrir menu" aria-expanded="false">
                ☰
            </button>
        </div>
    </header>

    <!-- ============================================================
    CONTEÚDO PRINCIPAL (renderizado pelo JavaScript)
    ============================================================ -->
    <main class="app-main" id="appMain" role="main">
        <!-- O conteúdo é gerado dinamicamente pelo script.js -->
        <!-- As páginas disponíveis são: login, cadastro, home, faixas, promocao, beneficios -->
    </main>

    <!-- ============================================================
    MODAL DE VÍDEO (sobreposição para exibir vídeos do YouTube)
    ============================================================ -->
    <div class="video-modal" id="videoModal" role="dialog" aria-modal="true" aria-labelledby="videoTitle">
        <div class="video-modal-content">
            <button class="close-modal" id="closeModal" aria-label="Fechar vídeo">
                ✕
            </button>
            <div class="video-title" id="videoTitle">Técnica de Jiu-Jitsu</div>
            <iframe
            id="videoIframe"
            src=""
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            loading="lazy"
            title="Vídeo da técnica"
            >
        </iframe>
    </div>
</div>

<!-- ============================================================
RODAPÉ (sempre visível)
============================================================ -->
<footer class="app-footer" role="contentinfo">
    <p>🥋 Jiu-Jitsu Pro | Treino, Respeito, Evolução</p>
    <p class="small">© 2025 - Todos os direitos reservados</p>
    <p class="small" style="margin-top:0.3rem; opacity:0.5;">
        Desenvolvido com ❤️ para a comunidade de Jiu-Jitsu
    </p>
</footer>

<!-- ============================================================
JAVASCRIPT (lógica da aplicação)
============================================================ -->
<script src="script.js"></script>

</body>
</html>
